# =============================================================================
# Kitty terminal configuration
# =============================================================================
# Managed by the dotfiles installer (symlinked to ~/.config/kitty/kitty.conf).
# Reload a running kitty with `ctrl+shift+f5` after editing.

# -----------------------------------------------------------------------------
# Fonts
# -----------------------------------------------------------------------------
# FiraCode Nerd Font is the font installed by ./install.sh (the "Nerd Fonts"
# step). It ships the programming ligatures plus the glyphs used by Starship,
# Neovim and the shell prompt. On Debian, install the Nerd Font variant if the
# glyphs render as boxes (apt only ships the plain "Fira Code" package).
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------
# NOTE: kitty has no config directive to start maximized; the installer adds
# `--start-as=maximized` to the kitty .desktop launcher instead.
remember_window_size  no
window_padding_width  6
hide_window_decorations no
confirm_os_window_close 0

# -----------------------------------------------------------------------------
# Scrollback & cursor
# -----------------------------------------------------------------------------
scrollback_lines      10000
cursor_shape          beam
cursor_blink_interval 0

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell no

# -----------------------------------------------------------------------------
# Tabs
# -----------------------------------------------------------------------------
tab_bar_edge   bottom
tab_bar_style  powerline

# -----------------------------------------------------------------------------
# Color scheme — Rose Pine (matches the Neovim theme in this repo)
# https://rosepinetheme.com
# -----------------------------------------------------------------------------
foreground            #e0def4
background            #191724
selection_foreground  #e0def4
selection_background  #403d52

cursor                #524f67
cursor_text_color     #e0def4

url_color             #c4a7e7

